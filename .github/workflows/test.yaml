name: CI
on: [workflow_dispatch, pull_request, push]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -e . nbdev
      - run: nbdev-test
      - name: notebooks and exported modules are in sync
        run: nbdev-export && git diff --exit-code
